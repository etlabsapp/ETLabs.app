<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlipFeed – Start the app</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d0d0f;
      color: #e8e6e3;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      padding: 32px;
      background: #1a1a1e;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    h1 { margin: 0 0 8px; font-size: 1.5rem; }
    p { margin: 0 0 20px; color: #9c9892; font-size: 0.95rem; line-height: 1.5; }
    code {
      display: block;
      margin: 16px 0;
      padding: 14px 16px;
      background: #222228;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #e8e6e3;
    }
    a {
      color: #e8e6e3;
      text-decoration: underline;
    }
    a:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <h1>FlipFeed</h1>
    <p>You’re viewing the project folder. FlipFeed is a Node/Next.js app and needs to be run with a dev server to show the board.</p>
    <p><strong>In a terminal, from this folder run:</strong></p>
    <code>npm run dev</code>
    <p>Then open <a href="http://localhost:3000" target="_blank" rel="noopener">http://localhost:3000</a> in your browser to see the split-flap board.</p>
  </div>
</body>
</html>
